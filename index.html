<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Clarens Heritage Trail</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

:root{
  --olive:#4a5240;--olive-dark:#363c2f;--olive-mid:#5c6650;--olive-light:#7a8a6a;
  --sage:#c8d4b8;--sage-light:#e8ede0;--sage-pale:#f2f5ee;--cream:#fafaf6;
  --plaque-blue:#1a4a7a;--gold:#c8a052;
  --text:#1e2318;--text-mid:#3d4a30;--text-light:#6b7a5a;--white:#fff;
  --shadow:0 4px 20px rgba(74,82,64,.12);--shadow-lg:0 8px 36px rgba(74,82,64,.20);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}
#splash{position:fixed;inset:0;z-index:1000;background:var(--olive);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;transition:opacity .7s ease,transform .7s ease}
#splash.hide{opacity:0;transform:translateY(-16px);pointer-events:none}
.splash-beta{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.65);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.splash-logo{width:180px;height:auto;margin-bottom:20px}
.splash-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,9vw,3.2rem);font-weight:600;color:#fff;text-align:center;line-height:1.1;margin-bottom:6px}
.splash-sub{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,212,184,.65);margin-bottom:48px}
.btn-start{background:#fff;color:var(--olive);border:none;padding:16px 44px;font-family:'Jost',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.btn-start:hover{background:var(--sage);transform:translateY(-2px)}
.splash-footer{position:absolute;bottom:20px;color:rgba(200,212,184,.4);font-size:.62rem;letter-spacing:.12em}
#app{display:none;flex-direction:column;min-height:100vh}
#app.visible{display:flex}
header{background:var(--olive);padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(30,35,24,.35)}
.header-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:36px;height:auto}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:#fff;display:block;line-height:1.1}
.hdr-sub{font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);display:block}
.hdr-beta{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--sage);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border-radius:12px}
nav{background:var(--olive-dark);display:flex;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:11px 18px;font-family:'Jost',sans-serif;font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,212,184,.5);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-tab.active{color:#fff;border-bottom-color:var(--sage)}
.nav-tab:hover{color:var(--sage)}
.panel{display:none;flex:1}.panel.active{display:block}
.trail-hero{background:linear-gradient(160deg,var(--olive) 0%,var(--olive-mid) 100%);padding:24px 20px 28px;position:relative;overflow:hidden}
.trail-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border:1px solid rgba(200,212,184,.15);border-radius:50%}
.trail-hero h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:#fff;margin-bottom:4px;position:relative}
.trail-hero p{color:var(--sage);font-size:.82rem;font-weight:300;line-height:1.65;max-width:280px;position:relative}
.progress-track{background:rgba(255,255,255,.12);border-radius:20px;height:6px;overflow:hidden;margin-top:18px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sage),#fff);border-radius:20px;transition:width .7s ease}
.progress-label{color:rgba(200,212,184,.7);font-size:.68rem;letter-spacing:.1em;margin-top:7px}
.section-label{font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--text-light);padding:18px 18px 8px;display:block}
.sites-list{padding:0 14px 24px;display:flex;flex-direction:column;gap:10px}
.site-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;border:1.5px solid transparent}
.site-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.site-card.visited{border-color:var(--olive-light);background:linear-gradient(135deg,#f6f9f2,#fff)}
.card-accent{width:5px;flex-shrink:0}
.ac-blue{background:var(--plaque-blue)}.ac-olive{background:var(--olive)}.ac-gold{background:var(--gold)}.ac-mid{background:var(--olive-mid)}
.card-body{padding:14px;flex:1;display:flex;align-items:center;gap:12px}
.card-icon{width:46px;height:46px;border-radius:8px;background:var(--sage-pale);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;border:1px solid var(--sage)}
.card-info{flex:1;min-width:0}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-year{background:var(--sage-pale);color:var(--olive);border:1px solid var(--sage);padding:1px 7px;border-radius:10px;font-size:.65rem;font-weight:700}
.card-addr{font-size:.7rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.card-stamp{width:32px;height:32px;border-radius:50%;border:1.5px dashed var(--sage);display:flex;align-items:center;justify-content:center;color:var(--sage);font-size:.9rem;opacity:.5;flex-shrink:0;transition:all .3s}
.card-stamp.earned{border-style:solid;border-color:var(--olive);background:var(--olive);color:#fff;opacity:1}
#detail-view{display:none;position:fixed;inset:0;z-index:200;background:var(--cream);overflow-y:auto}
#detail-view.open{display:block;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-header{background:var(--olive);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.btn-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.btn-back:hover{background:rgba(255,255,255,.22)}
.detail-hdr-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:#fff}
.detail-photo{width:100%;height:220px;object-fit:cover;display:block}
.detail-photo-ph{width:100%;height:220px;background:linear-gradient(135deg,var(--sage-light),var(--sage-pale));display:flex;align-items:center;justify-content:center;font-size:5rem}
.detail-body{padding:22px 18px 40px}
.plaque-badge{display:inline-flex;align-items:center;gap:5px;background:var(--plaque-blue);color:#fff;padding:3px 11px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.detail-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--text);line-height:1.15;margin-bottom:6px}
.detail-addr{color:var(--text-light);font-size:.8rem;margin-bottom:20px}
.detail-divider{height:1px;background:var(--sage);margin:18px 0}
.facts-box{background:var(--sage-pale);border:1px solid var(--sage);border-radius:8px;padding:14px;margin-bottom:18px}
.facts-box h4{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:700;color:var(--olive);margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em}
.fact-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--sage);font-size:.78rem}
.fact-row:last-child{border-bottom:none}
.fact-label{color:var(--text-light)}.fact-value{color:var(--text);font-weight:600;text-align:right;max-width:55%}
.detail-text{font-size:.88rem;line-height:1.82;color:var(--text-mid);margin-bottom:14px}
.btn-stamp{width:100%;background:var(--olive);color:#fff;border:none;padding:16px;border-radius:8px;font-family:'Jost',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-stamp:hover{background:var(--olive-mid);transform:translateY(-1px)}
.btn-stamp.stamped{background:var(--text-light);cursor:default}
.btn-stamp.stamped:hover{transform:none}
.btn-maps{width:100%;background:var(--sage-pale);color:var(--olive);border:1.5px solid var(--sage);padding:13px;border-radius:8px;font-family:'Jost',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-maps:hover{background:var(--sage)}
.passport-wrap{padding:16px}
.passport-card{background:linear-gradient(145deg,var(--olive) 0%,var(--olive-dark) 100%);border-radius:14px;padding:26px 22px;text-align:center;position:relative;overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow-lg)}
.passport-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 24px,rgba(200,212,184,.04) 24px,rgba(200,212,184,.04) 48px)}
.passport-emblem{font-size:3rem;margin-bottom:10px;position:relative}
.passport-card h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:#fff;margin-bottom:3px;position:relative}
.passport-org{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);position:relative;margin-bottom:18px;display:block}
.passport-score{display:flex;align-items:baseline;justify-content:center;gap:3px;position:relative}
.score-num{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:700;color:var(--sage);line-height:1}
.score-denom{font-size:1.1rem;color:rgba(200,212,184,.4);padding-bottom:4px}
.stamps-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stamp-card{background:#fff;border-radius:10px;padding:18px 12px;text-align:center;box-shadow:var(--shadow);border:1.5px solid transparent;transition:all .3s}
.stamp-card.earned{border-color:var(--olive-light);background:linear-gradient(135deg,#f3f7ee,#fff)}
.stamp-card.locked{opacity:.45}
.stamp-icon{font-size:2rem;margin-bottom:7px}
.stamp-name{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:3px}
.stamp-status{font-size:.68rem;color:var(--text-light)}
.stamp-card.earned .stamp-status{color:var(--olive);font-weight:700}
.donate-box{background:var(--olive-dark);border-radius:12px;padding:22px 18px;text-align:center;box-shadow:var(--shadow-lg)}
.donate-box h3{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:#fff;margin-bottom:8px}
.donate-box p{font-size:.8rem;color:var(--sage);line-height:1.65;margin-bottom:18px}
.btn-donate{background:var(--sage);color:var(--olive-dark);border:none;padding:13px 30px;border-radius:6px;font-family:'Jost',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-donate:hover{background:#fff}
.map-wrap{padding:16px}
.map-ph{background:linear-gradient(135deg,var(--sage-light),var(--sage-pale));border:1.5px dashed var(--olive-light);border-radius:12px;padding:28px 18px;text-align:center;margin-bottom:18px}
.map-ph h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--olive);margin-bottom:6px}
.map-ph p{font-size:.8rem;color:var(--text-light);line-height:1.65}
.map-list{display:flex;flex-direction:column;gap:8px}
.map-row{background:#fff;border-radius:8px;padding:13px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(74,82,64,.07);transition:transform .18s;text-decoration:none}
.map-row:hover{transform:translateX(4px)}
.map-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-info{flex:1}
.map-name{font-family:'Cormorant Garamond',serif;font-size:.98rem;font-weight:600;color:var(--text)}
.map-addr{font-size:.72rem;color:var(--text-light)}
.map-arrow{color:var(--olive-light)}
.about-wrap{padding:16px}
.about-hero{background:var(--olive);border-radius:12px;padding:26px 20px;text-align:center;margin-bottom:14px}
.about-hero h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#fff;margin-bottom:8px}
.about-hero p{color:var(--sage);font-size:.82rem;line-height:1.7}
.beta-bar{background:#fffbea;border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:13px 14px;margin-bottom:12px}
.beta-bar h4{color:var(--olive);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.beta-bar p{font-size:.78rem;color:var(--text-light);line-height:1.6}
.about-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(74,82,64,.06)}
.about-card h3{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--olive);margin-bottom:8px}
.about-card p{font-size:.82rem;color:var(--text-mid);line-height:1.72}
.about-card a{color:var(--olive);font-weight:700;text-decoration:none}
.stamp-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:999;pointer-events:none;background:var(--olive);width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;transition:transform .35s cubic-bezier(.175,.885,.32,1.275),opacity .3s;opacity:0}
.stamp-burst.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.stamp-burst.hide{transform:translate(-50%,-50%) scale(1.15);opacity:0}
.burst-icon{font-size:2.4rem}
.burst-text{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;color:var(--sage)}

</style>
